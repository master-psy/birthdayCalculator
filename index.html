<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>生日计算器</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #1f2937;
      --muted: #667085;
      --line: rgba(31, 41, 55, .12);
      --panel: rgba(255, 255, 255, .86);
      --panel-strong: #ffffff;
      --primary: #e0527f;
      --primary-dark: #be345f;
      --accent: #1f9f8f;
      --gold: #f3b34c;
      --shadow: 0 22px 60px rgba(34, 43, 69, .16);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 16% 18%, rgba(255, 194, 123, .38), transparent 31%),
        radial-gradient(circle at 84% 8%, rgba(31, 159, 143, .28), transparent 30%),
        linear-gradient(135deg, #fff8ee 0%, #fff4f8 42%, #eefaf7 100%);
    }

    .page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 18px;
    }

    .app {
      width: min(1040px, 100%);
      display: grid;
      grid-template-columns: minmax(0, 1fr) 380px;
      gap: 22px;
      align-items: stretch;
    }

    .main,
    .result {
      border: 1px solid rgba(255, 255, 255, .74);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
    }

    .main {
      border-radius: var(--radius);
      padding: clamp(24px, 4vw, 42px);
      overflow: hidden;
      position: relative;
    }

    .main::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(90deg, rgba(224, 82, 127, .08) 1px, transparent 1px),
        linear-gradient(rgba(31, 159, 143, .07) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: linear-gradient(135deg, rgba(0, 0, 0, .34), transparent 58%);
    }

    .content {
      position: relative;
      z-index: 1;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 12px;
      color: var(--primary-dark);
      font-size: 14px;
      font-weight: 700;
    }

    .spark {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 18px 4px 0 -2px var(--accent), 9px -8px 0 -3px var(--primary);
    }

    h1 {
      margin: 0;
      max-width: 720px;
      font-size: clamp(34px, 6vw, 68px);
      line-height: 1.02;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 18px 0 0;
      max-width: 620px;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.8;
    }

    .form {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-top: 34px;
    }

    .field {
      min-width: 0;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #344054;
      font-size: 14px;
      font-weight: 700;
    }

    input {
      width: 100%;
      min-height: 56px;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 0 16px;
      color: var(--ink);
      background: rgba(255, 255, 255, .9);
      font: inherit;
      font-size: 16px;
      outline: none;
      transition: border-color .18s ease, box-shadow .18s ease, transform .18s ease;
    }

    input:focus {
      border-color: rgba(224, 82, 127, .72);
      box-shadow: 0 0 0 4px rgba(224, 82, 127, .14);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 22px;
    }

    button {
      min-height: 50px;
      border: 0;
      border-radius: 999px;
      padding: 0 22px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease, background .18s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .primary {
      color: #fff;
      background: linear-gradient(135deg, var(--primary), #d24668);
      box-shadow: 0 14px 26px rgba(224, 82, 127, .28);
    }

    .secondary {
      color: #1f2937;
      background: rgba(255, 255, 255, .78);
      border: 1px solid var(--line);
    }

    .hint {
      margin-top: 18px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .result {
      border-radius: var(--radius);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .result-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--line);
    }

    .result-title {
      margin: 0;
      font-size: 18px;
      font-weight: 900;
    }

    .today {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .metric {
      border-radius: 18px;
      padding: 18px;
      background: var(--panel-strong);
      border: 1px solid var(--line);
    }

    .metric strong {
      display: block;
      font-size: clamp(28px, 5vw, 44px);
      line-height: 1;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .metric span {
      display: block;
      margin-top: 9px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .metric.highlight {
      color: #fff;
      background: linear-gradient(135deg, #1f9f8f, #157a84);
      border: 0;
    }

    .metric.highlight span {
      color: rgba(255, 255, 255, .82);
    }

    .metric.highlight strong {
      font-size: clamp(26px, 3vw, 38px);
      line-height: 1.18;
    }

    .message {
      min-height: 48px;
      margin-top: auto;
      border-radius: 16px;
      padding: 14px 16px;
      color: #6941c6;
      background: rgba(105, 65, 198, .09);
      font-size: 14px;
      line-height: 1.7;
    }

    .error {
      color: #b42318;
      background: rgba(180, 35, 24, .08);
    }

    .insights {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .chip {
      min-width: 0;
      border-radius: 16px;
      padding: 12px 14px;
      background: rgba(255, 255, 255, .72);
      border: 1px solid var(--line);
    }

    .chip b {
      display: block;
      font-size: 20px;
      line-height: 1.15;
      overflow-wrap: anywhere;
    }

    .chip span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .wish-box {
      border-radius: 18px;
      padding: 18px;
      background: linear-gradient(135deg, rgba(224, 82, 127, .1), rgba(243, 179, 76, .16));
      border: 1px solid rgba(224, 82, 127, .18);
    }

    .wish-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .wish-title strong {
      font-size: 16px;
    }

    .mini {
      min-height: 34px;
      padding: 0 13px;
      font-size: 13px;
      box-shadow: none;
    }

    .wish-text {
      margin: 0;
      color: #3d2b3a;
      font-size: 15px;
      line-height: 1.8;
    }

    .quote {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    @media (max-width: 860px) {
      .app {
        grid-template-columns: 1fr;
      }

      .result {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .result-head,
      .message {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 560px) {
      .page {
        padding: 18px 12px;
      }

      .main,
      .result {
        border-radius: 18px;
      }

      .form,
      .result,
      .insights {
        grid-template-columns: 1fr;
      }

      .actions {
        display: grid;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="app" aria-label="生日计算器">
      <div class="main">
        <div class="content">
          <p class="eyebrow"><span class="spark" aria-hidden="true"></span> 入职生日节点</p>
          <h1>计算下一次生日在入职后的哪一天</h1>
          <p class="subtitle">输入入职日期和生日，系统会自动找到从今天起的下一次生日，并计算它是入职第几天、入职后的第几次生日。</p>

          <form class="form" id="birthdayForm">
            <div class="field">
              <label for="joinDate">入职日期</label>
              <input id="joinDate" type="date" required />
            </div>
            <div class="field">
              <label for="birthday">生日</label>
              <input id="birthday" type="date" required />
            </div>
          </form>

          <div class="actions">
            <button class="primary" type="submit" form="birthdayForm">开始计算</button>
            <button class="secondary" type="button" id="sampleBtn">填入示例</button>
          </div>

          <p class="hint">天数按“入职当天为第 1 天”计算；生日只取月和日，生日年份用于识别出生日期。</p>
        </div>
      </div>

      <aside class="result" aria-live="polite">
        <div class="result-head">
          <p class="result-title">计算结果</p>
          <span class="today" id="todayText"></span>
        </div>
        <div class="metric highlight">
          <strong id="nextBirthday">--</strong>
          <span>下一次生日日期</span>
        </div>
        <div class="metric">
          <strong id="workDay">--</strong>
          <span>这一天是入职第几天</span>
        </div>
        <div class="metric">
          <strong id="birthdayCount">--</strong>
          <span>这是入职后的第几次生日</span>
        </div>
        <div class="insights">
          <div class="chip">
            <b id="constellation">--</b>
            <span>星座</span>
          </div>
          <div class="chip">
            <b id="zodiac">--</b>
            <span>生肖</span>
          </div>
          <div class="chip">
            <b id="birthYear">--</b>
            <span>出生年份</span>
          </div>
          <div class="chip">
            <b id="ageText">--</b>
            <span>下一次生日年龄</span>
          </div>
        </div>
        <div class="wish-box">
          <div class="wish-title">
            <strong>生日祝福语</strong>
            <button class="secondary mini" type="button" id="wishBtn">换一句</button>
          </div>
          <p class="wish-text" id="wishText">计算后会自动生成一段祝福。</p>
          <p class="quote" id="quoteText">灵感接口：等待调用</p>
        </div>
        <div class="message" id="message">填写日期后，结果会显示在这里。</div>
      </aside>
    </section>
  </main>

  <script>
    const form = document.querySelector("#birthdayForm");
    const joinInput = document.querySelector("#joinDate");
    const birthdayInput = document.querySelector("#birthday");
    const sampleBtn = document.querySelector("#sampleBtn");
    const todayText = document.querySelector("#todayText");
    const nextBirthdayText = document.querySelector("#nextBirthday");
    const workDayText = document.querySelector("#workDay");
    const birthdayCountText = document.querySelector("#birthdayCount");
    const constellationText = document.querySelector("#constellation");
    const zodiacText = document.querySelector("#zodiac");
    const birthYearText = document.querySelector("#birthYear");
    const ageText = document.querySelector("#ageText");
    const wishBtn = document.querySelector("#wishBtn");
    const wishText = document.querySelector("#wishText");
    const quoteText = document.querySelector("#quoteText");
    const message = document.querySelector("#message");

    const MS_PER_DAY = 24 * 60 * 60 * 1000;
    let lastBirthdayInfo = null;

    function toLocalDate(value) {
      const [year, month, day] = value.split("-").map(Number);
      return new Date(year, month - 1, day);
    }

    function formatDate(date) {
      return date.toLocaleDateString("zh-CN", {
        year: "numeric",
        month: "long",
        day: "numeric",
        weekday: "long"
      });
    }

    function dateKey(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function normalizeBirthday(year, month, day) {
      const birthday = new Date(year, month, day);
      const isLeapDay = month === 1 && day === 29;
      if (isLeapDay && birthday.getMonth() !== 1) {
        return new Date(year, 1, 28);
      }
      return birthday;
    }

    function dayDiffInclusive(start, end) {
      const startUtc = Date.UTC(start.getFullYear(), start.getMonth(), start.getDate());
      const endUtc = Date.UTC(end.getFullYear(), end.getMonth(), end.getDate());
      return Math.floor((endUtc - startUtc) / MS_PER_DAY) + 1;
    }

    function countBirthdaysAfterJoin(joinDate, targetBirthday, birthdayMonth, birthdayDay) {
      let count = 0;
      for (let year = joinDate.getFullYear(); year <= targetBirthday.getFullYear(); year += 1) {
        const birthday = normalizeBirthday(year, birthdayMonth, birthdayDay);
        if (birthday >= joinDate && birthday <= targetBirthday) {
          count += 1;
        }
      }
      return count;
    }

    function getConstellation(month, day) {
      const signs = [
        ["摩羯座", 1, 20], ["水瓶座", 2, 19], ["双鱼座", 3, 21], ["白羊座", 4, 20],
        ["金牛座", 5, 21], ["双子座", 6, 22], ["巨蟹座", 7, 23], ["狮子座", 8, 23],
        ["处女座", 9, 23], ["天秤座", 10, 24], ["天蝎座", 11, 23], ["射手座", 12, 22],
        ["摩羯座", 12, 32]
      ];
      const numberMonth = month + 1;
      return signs.find(([, signMonth, startDay]) => numberMonth < signMonth || (numberMonth === signMonth && day < startDay))[0];
    }

    function getChineseZodiac(year) {
      const animals = ["鼠", "牛", "虎", "兔", "龙", "蛇", "马", "羊", "猴", "鸡", "狗", "猪"];
      return animals[(year - 4) % 12];
    }

    function buildLocalWish(info, quote) {
      const wishes = [
        `愿这个${info.constellation}的生日，把新的好运、清醒的判断和温柔的惊喜都带到你身边。${info.nextAge}岁这一年，继续闪闪发光。`,
        `生日快乐！属${info.zodiac}的你，自带一份认真和韧劲。愿新一岁有热爱可奔赴，有目标可抵达，也有轻松自在的日常。`,
        `下一次生日会是入职后的第 ${info.birthdayCount} 次生日，愿这一天不只被记住，也被好好庆祝。愿你一路有成长，也一路有甜。`,
        `愿${info.birthYear}年出生的你，在${info.nextAge}岁这一年收获稳定、喜悦和漂亮的新开始。生日快乐，万事胜意。`
      ];
      const index = Math.abs(info.workDay + info.birthdayCount + Date.now()) % wishes.length;
      return quote ? `${wishes[index]} 灵感送你一句：“${quote.hitokoto}”` : wishes[index];
    }

    async function getHitokotoQuote() {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 3500);
      try {
        const response = await fetch("https://v1.hitokoto.cn/?encode=json&c=d&c=e&c=i&max_length=36", {
          signal: controller.signal
        });
        if (!response.ok) {
          throw new Error("quote api failed");
        }
        const data = await response.json();
        return {
          hitokoto: data.hitokoto,
          from: data.from || "一言",
          uuid: data.uuid
        };
      } finally {
        clearTimeout(timer);
      }
    }

    async function renderWish(info) {
      wishText.textContent = "正在生成祝福语...";
      quoteText.textContent = "灵感接口：正在调用一言";
      try {
        const quote = await getHitokotoQuote();
        wishText.textContent = buildLocalWish(info, quote);
        quoteText.textContent = "灵感来源：";
        if (quote.uuid) {
          const link = document.createElement("a");
          link.href = `https://hitokoto.cn?uuid=${encodeURIComponent(quote.uuid)}`;
          link.target = "_blank";
          link.rel = "noreferrer";
          link.textContent = `一言《${quote.from}》`;
          quoteText.append(link);
        } else {
          quoteText.append(`一言《${quote.from}》`);
        }
      } catch (error) {
        wishText.textContent = buildLocalWish(info);
        quoteText.textContent = "灵感接口：调用失败，已使用本地祝福模板";
      }
    }

    function showError(text) {
      nextBirthdayText.textContent = "--";
      workDayText.textContent = "--";
      birthdayCountText.textContent = "--";
      constellationText.textContent = "--";
      zodiacText.textContent = "--";
      birthYearText.textContent = "--";
      ageText.textContent = "--";
      wishText.textContent = "计算后会自动生成一段祝福。";
      quoteText.textContent = "灵感接口：等待调用";
      lastBirthdayInfo = null;
      message.textContent = text;
      message.classList.add("error");
    }

    function calculate() {
      if (!joinInput.value || !birthdayInput.value) {
        showError("请先填写入职日期和生日。");
        return;
      }

      const today = new Date();
      const currentDate = new Date(today.getFullYear(), today.getMonth(), today.getDate());
      const joinDate = toLocalDate(joinInput.value);
      const birthDate = toLocalDate(birthdayInput.value);
      const birthdayMonth = birthDate.getMonth();
      const birthdayDay = birthDate.getDate();

      let nextBirthday = normalizeBirthday(currentDate.getFullYear(), birthdayMonth, birthdayDay);
      if (nextBirthday < currentDate) {
        nextBirthday = normalizeBirthday(currentDate.getFullYear() + 1, birthdayMonth, birthdayDay);
      }

      if (nextBirthday < joinDate) {
        showError("下一次生日早于入职日期，暂时无法计算入职后的生日次数。请确认入职日期是否正确。");
        return;
      }

      const workDay = dayDiffInclusive(joinDate, nextBirthday);
      const count = countBirthdaysAfterJoin(joinDate, nextBirthday, birthdayMonth, birthdayDay);
      const daysUntilBirthday = dayDiffInclusive(currentDate, nextBirthday) - 1;
      const constellation = getConstellation(birthdayMonth, birthdayDay);
      const zodiac = getChineseZodiac(birthDate.getFullYear());
      const nextAge = nextBirthday.getFullYear() - birthDate.getFullYear();

      nextBirthdayText.textContent = formatDate(nextBirthday);
      workDayText.textContent = `第 ${workDay} 天`;
      birthdayCountText.textContent = `第 ${count} 次`;
      constellationText.textContent = constellation;
      zodiacText.textContent = zodiac;
      birthYearText.textContent = `${birthDate.getFullYear()} 年`;
      ageText.textContent = `${nextAge} 岁`;
      message.textContent = daysUntilBirthday === 0
        ? "下一次生日就是今天，记得送上祝福。"
        : `距离下一次生日还有 ${daysUntilBirthday} 天。`;
      message.classList.remove("error");

      lastBirthdayInfo = {
        birthYear: birthDate.getFullYear(),
        birthdayCount: count,
        constellation,
        nextAge,
        workDay,
        zodiac
      };
      renderWish(lastBirthdayInfo);
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      calculate();
    });

    sampleBtn.addEventListener("click", () => {
      joinInput.value = "2022-04-18";
      birthdayInput.value = "1996-10-09";
      calculate();
    });

    wishBtn.addEventListener("click", async () => {
      if (!lastBirthdayInfo) {
        showError("请先完成一次生日计算，再生成祝福语。");
        return;
      }
      await renderWish(lastBirthdayInfo);
    });

    todayText.textContent = `今天 ${dateKey(new Date())}`;
  </script>
</body>
</html>
